<!DOCTYPE html>
<html>
<head>
  <title>Schedule Reminder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <main id="viewContainer">
      <section id="dailyView" class="view active">
        <div id="authSection">
            <h2>Account (optional)</h2>
            <div id="loggedOutView">
                <input id="email" type="email" placeholder="Email" />
                <input id="password" type="password" placeholder="Password" />
                <button id="signUpBtn">Sign Up</button>
                <button id="signInBtn">Sign In</button>
            </div>
            <div id="loggedInView" style="display: none;">
                <span id="userEmail"></span>
                <button id="signOutBtn">Sign Out</button>
            </div>
            <p id="authError" style="color: red;"></p>
        </div>
        <h2 id="formTitle">Add Reminder</h2>
        <input id="name" placeholder="Name" />
        <input id="info" placeholder="Info (optional)" />
        <input id="time" type="time" />
        <button id="addBtn">Add</button>

        <h2>Your Reminders</h2>
        <ul id="list"></ul>
      </section>

      <section id="monthlyView" class="view">
        <div id="monthlyHeader">
          <button id="prevMonthBtn" class="cal-nav-btn">‹</button>
          <h2 id="monthLabel"></h2>
          <button id="nextMonthBtn" class="cal-nav-btn">›</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>

        <div id="dayPanel" style="display: none;">
          <h3 id="dayPanelTitle"></h3>
          <ul id="dayReminderList"></ul>

          <h4 id="monthlyFormTitle">Add Reminder</h4>
          <input id="monthlyName" placeholder="Name" />
          <input id="monthlyInfo" placeholder="Info (optional)" />
          <input id="monthlyTime" type="time" />
          <select id="monthlyRepeat">
            <option value="none">Does not repeat</option>
            <option value="daily">Repeats daily</option>
            <option value="weekly">Repeats weekly</option>
            <option value="monthly">Repeats monthly</option>
          </select>
          <button id="monthlyAddBtn">Add</button>
          <button id="closeDayPanelBtn">Close</button>
          <p id="monthlyError" style="color: red;"></p>
        </div>
      </section>
    </main>

    <nav id="tabBar">
      <button class="tab-btn active" data-view="dailyView">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Daily Reminder</span>
      </button>
      <button class="tab-btn" data-view="monthlyView">
        <span class="tab-icon">🗓️</span>
        <span class="tab-label">Monthly Reminder</span>
      </button>
    </nav>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore,
    collection,
    doc,
    setDoc,
    deleteDoc,
    onSnapshot,
    enableIndexedDbPersistence,
    arrayUnion,
    arrayRemove
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
  import { occursOn, isDoneOn, getOccurrencesInMonth, daysInMonth } from './recurrence.js';
  window.recurrence = { occursOn, isDoneOn, getOccurrencesInMonth, daysInMonth };

  const firebaseConfig = {
    apiKey: "AIzaSyDRrzw3kbk-s7lG8PUgWtzzOF2GUGEMvCc",
    authDomain: "schedule-reminder-f705a.firebaseapp.com",
    projectId: "schedule-reminder-f705a",
    storageBucket: "schedule-reminder-f705a.firebasestorage.app",
    messagingSenderId: "441299592379",
    appId: "1:441299592379:web:ae1374d74e00af7ab2f59e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Enable offline caching/sync for Firestore
  enableIndexedDbPersistence(db).catch((err) => {
    console.warn('Offline persistence not enabled:', err.code);
  });

  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const authError = document.getElementById('authError');
  const loggedOutView = document.getElementById('loggedOutView');
  const loggedInView = document.getElementById('loggedInView');
  const userEmailSpan = document.getElementById('userEmail');

  document.getElementById('signUpBtn').addEventListener('click', async () => {
    authError.innerText = '';
    try {
      await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch (err) {
      authError.innerText = err.message;
    }
  });

  document.getElementById('signInBtn').addEventListener('click', async () => {
    authError.innerText = '';
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch (err) {
      authError.innerText = err.message;
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await signOut(auth);
  });

  // ---- Shared state ----
  let currentUser = null;
  let unsubscribeSnapshot = null;
  let unsubscribeMonthlySnapshot = null;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (user) {
      loggedOutView.style.display = 'none';
      loggedInView.style.display = 'block';
      userEmailSpan.innerText = user.email;
      startCloudSync(user.uid);
      startMonthlyCloudSync(user.uid);
    } else {
      loggedOutView.style.display = 'block';
      loggedInView.style.display = 'none';
      if (unsubscribeSnapshot) {
        unsubscribeSnapshot();
        unsubscribeSnapshot = null;
      }
      if (unsubscribeMonthlySnapshot) {
        unsubscribeMonthlySnapshot();
        unsubscribeMonthlySnapshot = null;
      }
      window.api.syncCloudReminders([]); // main process should stop tracking cloud reminders
      window.api.syncCloudMonthlyReminders([]);
      refreshList(); // fall back to local
      refreshMonthlyList();
    }
  });

  function startCloudSync(uid) {
    const remindersRef = collection(db, 'users', uid, 'reminders');

    // Real-time listener: fires immediately with cached/local data,
    // then again whenever cloud data changes (including from other devices)
    unsubscribeSnapshot = onSnapshot(remindersRef, (snapshot) => {
      const reminders = [];
      snapshot.forEach(docSnap => {
        reminders.push({ id: docSnap.id, ...docSnap.data() });
      });
      renderReminders(sortByTime(reminders));
      // main process can't reach Firestore directly, so push the live list over
      // so it can fire OS notifications for cloud reminders too
      window.api.syncCloudReminders(reminders);
    });
  }

  function startMonthlyCloudSync(uid) {
    const monthlyRef = collection(db, 'users', uid, 'monthlyReminders');

    unsubscribeMonthlySnapshot = onSnapshot(monthlyRef, (snapshot) => {
      const reminders = [];
      snapshot.forEach(docSnap => {
        reminders.push({ id: docSnap.id, ...docSnap.data() });
      });
      renderMonthlyCalendar(reminders);
      window.api.syncCloudMonthlyReminders(reminders);
    }, (error) => {
      console.warn('Monthly cloud sync error - check Firestore rules cover users/{uid}/monthlyReminders:', error.code);
    });
  }

  function sortByTime(reminders) {
    return [...reminders].sort((a, b) => a.time.localeCompare(b.time));
  }

  // ---- Cloud CRUD functions ----
  async function cloudAddReminder(reminder) {
    const ref = doc(collection(db, 'users', currentUser.uid, 'reminders'));
    await setDoc(ref, {
      name: reminder.name,
      info: reminder.info,
      time: reminder.time,
      doneDate: null,
      lastNotified: null
    });
  }

  async function cloudEditReminder(updated) {
    const ref = doc(db, 'users', currentUser.uid, 'reminders', updated.id);
    await setDoc(ref, {
      name: updated.name,
      info: updated.info,
      time: updated.time,
      lastNotified: null
    }, { merge: true });
  }

  async function cloudSetDone(id, done) {
    const today = new Date().toISOString().slice(0, 10);
    const ref = doc(db, 'users', currentUser.uid, 'reminders', id);
    await setDoc(ref, { doneDate: done ? today : null }, { merge: true });
  }

  async function cloudDeleteReminder(id) {
    const ref = doc(db, 'users', currentUser.uid, 'reminders', id);
    await deleteDoc(ref);
  }

  async function cloudSetLastNotified(id) {
    const today = new Date().toISOString().slice(0, 10);
    const ref = doc(db, 'users', currentUser.uid, 'reminders', id);
    await setDoc(ref, { lastNotified: today }, { merge: true });
  }

  // ---- Monthly cloud CRUD functions ----
  async function cloudAddMonthlyReminder(reminder) {
    const ref = doc(collection(db, 'users', currentUser.uid, 'monthlyReminders'));
    await setDoc(ref, {
      name: reminder.name,
      info: reminder.info,
      date: reminder.date,
      time: reminder.time,
      repeat: reminder.repeat,
      completedDates: [],
      lastNotified: null
    });
  }

  async function cloudEditMonthlyReminder(updated) {
    const ref = doc(db, 'users', currentUser.uid, 'monthlyReminders', updated.id);
    await setDoc(ref, {
      name: updated.name,
      info: updated.info,
      date: updated.date,
      time: updated.time,
      repeat: updated.repeat,
      lastNotified: null
    }, { merge: true });
  }

  async function cloudSetMonthlyDone(id, date, done) {
    const ref = doc(db, 'users', currentUser.uid, 'monthlyReminders', id);
    await setDoc(ref, {
      completedDates: done ? arrayUnion(date) : arrayRemove(date)
    }, { merge: true });
  }

  async function cloudDeleteMonthlyReminder(id) {
    const ref = doc(db, 'users', currentUser.uid, 'monthlyReminders', id);
    await deleteDoc(ref);
  }

  async function cloudSetMonthlyLastNotified(id) {
    const today = new Date().toISOString().slice(0, 10);
    const ref = doc(db, 'users', currentUser.uid, 'monthlyReminders', id);
    await setDoc(ref, { lastNotified: today }, { merge: true });
  }

  // Expose these so the other script block (reminder UI logic) can use them
  window.cloudApi = {
    isLoggedIn: () => !!currentUser,
    addReminder: cloudAddReminder,
    editReminder: cloudEditReminder,
    setDone: cloudSetDone,
    deleteReminder: cloudDeleteReminder,
    addMonthlyReminder: cloudAddMonthlyReminder,
    editMonthlyReminder: cloudEditMonthlyReminder,
    setMonthlyDone: cloudSetMonthlyDone,
    deleteMonthlyReminder: cloudDeleteMonthlyReminder
  };
  window.dispatchEvent(new Event('cloudApiReady'));

  // main process fires these after showing a notification for a cloud reminder,
  // since it can only update the local reminders.json itself, not Firestore
  window.api.onMarkCloudNotified((id) => {
    if (currentUser) cloudSetLastNotified(id);
  });
  window.api.onMarkCloudDone((id) => {
    if (currentUser) cloudSetDone(id, true);
  });
  window.api.onMarkCloudMonthlyNotified((id) => {
    if (currentUser) cloudSetMonthlyLastNotified(id);
  });
  window.api.onMarkCloudMonthlyDone(({ id, date }) => {
    if (currentUser) cloudSetMonthlyDone(id, date, true);
  });

  // renderReminders and refreshList are defined in the other script block below,
  // but need to exist before onSnapshot can call them — see note after this code block
</script>

  <script>
  let editingId = null; // null = adding new, otherwise editing this id

  function renderReminders(reminders) {
    const today = new Date().toISOString().slice(0, 10);
    const list = document.getElementById('list');
    list.innerHTML = '';

    reminders.forEach(r => {
      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = r.doneDate === today;
      checkbox.addEventListener('change', async () => {
        if (window.cloudApi.isLoggedIn()) {
          await window.cloudApi.setDone(r.id, checkbox.checked);
        } else {
          await window.api.setDone(r.id, checkbox.checked);
          await refreshList();
        }
      });

      const label = document.createElement('span');
      label.innerText = ` ${r.time} - ${r.name}${r.info ? ' (' + r.info + ')' : ''} `;

      const editBtn = document.createElement('button');
      editBtn.innerText = 'Edit';
      editBtn.addEventListener('click', () => {
        editingId = r.id;
        document.getElementById('name').value = r.name;
        document.getElementById('info').value = r.info;
        document.getElementById('time').value = r.time;
        document.getElementById('addBtn').innerText = 'Save';
        document.getElementById('formTitle').innerText = 'Edit Reminder';
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = 'Delete';
      deleteBtn.addEventListener('click', async () => {
        if (window.cloudApi.isLoggedIn()) {
          await window.cloudApi.deleteReminder(r.id);
        } else {
          await window.api.deleteReminder(r.id);
          await refreshList();
        }
      });

      li.appendChild(checkbox);
      li.appendChild(label);
      li.appendChild(editBtn);
      li.appendChild(deleteBtn);
      list.appendChild(li);
    });
  }

  // Local-only refresh (used when NOT logged in)
  async function refreshList() {
    if (window.cloudApi.isLoggedIn()) return; // cloud mode handles its own rendering via onSnapshot
    const reminders = await window.api.getReminders();
    renderReminders(reminders);
  }

  document.getElementById('addBtn').addEventListener('click', async () => {
    const name = document.getElementById('name').value;
    const info = document.getElementById('info').value;
    const time = document.getElementById('time').value;

    if (!name || !time) return;

    const loggedIn = window.cloudApi.isLoggedIn();

    if (editingId) {
      const updated = { id: editingId, name, info, time };
      if (loggedIn) {
        await window.cloudApi.editReminder(updated);
      } else {
        await window.api.editReminder(updated);
      }
      editingId = null;
      document.getElementById('addBtn').innerText = 'Add';
      document.getElementById('formTitle').innerText = 'Add Reminder';
    } else {
      const reminder = { name, info, time };
      if (loggedIn) {
        await window.cloudApi.addReminder(reminder);
      } else {
        await window.api.addReminder({ id: Date.now().toString(), ...reminder });
      }
    }

    if (!loggedIn) await refreshList();

    document.getElementById('name').value = '';
    document.getElementById('info').value = '';
    document.getElementById('time').value = '';
  });

    window.addEventListener('cloudApiReady', () => {
    refreshList();
    setInterval(refreshList, 15000);
    });
</script>

  <script>
  // ---- Monthly reminder calendar UI ----
  let monthlyReminders = []; // last rendered set, cached for day-panel lookups
  let currentCalendarDate = new Date();
  let selectedDayStr = null;
  let monthlyEditingId = null;

  function renderMonthlyCalendar(reminders) {
    monthlyReminders = reminders;
    const year = currentCalendarDate.getFullYear();
    const month = currentCalendarDate.getMonth(); // 0-11

    document.getElementById('monthLabel').innerText =
      currentCalendarDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-weekday';
      el.innerText = d;
      grid.appendChild(el);
    });

    const firstDow = new Date(year, month, 1).getDay();
    const numDays = window.recurrence.daysInMonth(year, month);
    const todayStr = new Date().toISOString().slice(0, 10);

    for (let i = 0; i < firstDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let day = 1; day <= numDays; day++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const dayReminders = reminders.filter(r => window.recurrence.occursOn(r, dateStr));

      const el = document.createElement('div');
      el.className = 'cal-day';
      if (dateStr === todayStr) el.classList.add('today');
      if (dateStr === selectedDayStr) el.classList.add('selected');

      const num = document.createElement('span');
      num.className = 'cal-day-num';
      num.innerText = day;
      el.appendChild(num);

      if (dayReminders.length > 0) {
        const dot = document.createElement('span');
        dot.className = 'cal-dot';
        el.appendChild(dot);
      }

      el.addEventListener('click', () => selectDay(dateStr));
      grid.appendChild(el);
    }

    if (selectedDayStr) renderDayPanel(selectedDayStr);
  }

  function clearMonthlyForm() {
    document.getElementById('monthlyName').value = '';
    document.getElementById('monthlyInfo').value = '';
    document.getElementById('monthlyTime').value = '';
    document.getElementById('monthlyRepeat').value = 'none';
  }

  function selectDay(dateStr) {
    selectedDayStr = dateStr;
    monthlyEditingId = null;
    document.getElementById('monthlyFormTitle').innerText = 'Add Reminder';
    document.getElementById('monthlyAddBtn').innerText = 'Add';
    clearMonthlyForm();
    document.getElementById('monthlyError').innerText = '';
    renderMonthlyCalendar(monthlyReminders); // refresh selected-day highlight
    document.getElementById('dayPanel').style.display = 'block';
  }

  function showMonthlyError(err) {
    console.error(err);
    document.getElementById('monthlyError').innerText =
      err && err.code === 'permission-denied'
        ? 'Cloud sync for monthly reminders is not enabled yet (Firestore rules need updating).'
        : (err && err.message) || 'Something went wrong.';
  }

  function renderDayPanel(dateStr) {
    document.getElementById('dayPanelTitle').innerText =
      new Date(dateStr + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    const list = document.getElementById('dayReminderList');
    list.innerHTML = '';

    const dayReminders = monthlyReminders.filter(r => window.recurrence.occursOn(r, dateStr));

    dayReminders.forEach(r => {
      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = window.recurrence.isDoneOn(r, dateStr);
      checkbox.addEventListener('change', async () => {
        try {
          if (window.cloudApi.isLoggedIn()) {
            await window.cloudApi.setMonthlyDone(r.id, dateStr, checkbox.checked);
          } else {
            await window.api.setMonthlyDone(r.id, dateStr, checkbox.checked);
            await refreshMonthlyList();
          }
        } catch (err) {
          checkbox.checked = !checkbox.checked; // revert the optimistic UI change
          showMonthlyError(err);
        }
      });

      const label = document.createElement('span');
      const repeatTag = r.repeat && r.repeat !== 'none' ? ` [${r.repeat}]` : '';
      label.innerText = ` ${r.time} - ${r.name}${r.info ? ' (' + r.info + ')' : ''}${repeatTag} `;

      const editBtn = document.createElement('button');
      editBtn.innerText = 'Edit';
      editBtn.addEventListener('click', () => {
        monthlyEditingId = r.id;
        document.getElementById('monthlyName').value = r.name;
        document.getElementById('monthlyInfo').value = r.info;
        document.getElementById('monthlyTime').value = r.time;
        document.getElementById('monthlyRepeat').value = r.repeat;
        document.getElementById('monthlyAddBtn').innerText = 'Save';
        document.getElementById('monthlyFormTitle').innerText = 'Edit Reminder';
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = 'Delete';
      deleteBtn.addEventListener('click', async () => {
        try {
          if (window.cloudApi.isLoggedIn()) {
            await window.cloudApi.deleteMonthlyReminder(r.id);
          } else {
            await window.api.deleteMonthlyReminder(r.id);
            await refreshMonthlyList();
          }
        } catch (err) {
          showMonthlyError(err);
        }
      });

      li.appendChild(checkbox);
      li.appendChild(label);
      li.appendChild(editBtn);
      li.appendChild(deleteBtn);
      list.appendChild(li);
    });
  }

  // Local-only refresh (used when NOT logged in)
  async function refreshMonthlyList() {
    if (window.cloudApi.isLoggedIn()) return; // cloud mode handles its own rendering via onSnapshot
    const reminders = await window.api.getMonthlyReminders();
    renderMonthlyCalendar(reminders);
  }

  document.getElementById('prevMonthBtn').addEventListener('click', () => {
    currentCalendarDate = new Date(currentCalendarDate.getFullYear(), currentCalendarDate.getMonth() - 1, 1);
    renderMonthlyCalendar(monthlyReminders);
  });

  document.getElementById('nextMonthBtn').addEventListener('click', () => {
    currentCalendarDate = new Date(currentCalendarDate.getFullYear(), currentCalendarDate.getMonth() + 1, 1);
    renderMonthlyCalendar(monthlyReminders);
  });

  document.getElementById('closeDayPanelBtn').addEventListener('click', () => {
    selectedDayStr = null;
    document.getElementById('dayPanel').style.display = 'none';
    renderMonthlyCalendar(monthlyReminders);
  });

  document.getElementById('monthlyAddBtn').addEventListener('click', async () => {
    const name = document.getElementById('monthlyName').value;
    const info = document.getElementById('monthlyInfo').value;
    const time = document.getElementById('monthlyTime').value;
    const repeat = document.getElementById('monthlyRepeat').value;

    if (!name || !time || !selectedDayStr) return;

    const loggedIn = window.cloudApi.isLoggedIn();

    try {
      if (monthlyEditingId) {
        const updated = { id: monthlyEditingId, name, info, date: selectedDayStr, time, repeat };
        if (loggedIn) {
          await window.cloudApi.editMonthlyReminder(updated);
        } else {
          await window.api.editMonthlyReminder(updated);
        }
        monthlyEditingId = null;
        document.getElementById('monthlyAddBtn').innerText = 'Add';
        document.getElementById('monthlyFormTitle').innerText = 'Add Reminder';
      } else {
        const reminder = { name, info, date: selectedDayStr, time, repeat };
        if (loggedIn) {
          await window.cloudApi.addMonthlyReminder(reminder);
        } else {
          await window.api.addMonthlyReminder({ id: Date.now().toString(), ...reminder });
        }
      }

      if (!loggedIn) await refreshMonthlyList();

      document.getElementById('monthlyError').innerText = '';
      clearMonthlyForm();
    } catch (err) {
      showMonthlyError(err);
    }
  });

  window.addEventListener('cloudApiReady', () => {
    refreshMonthlyList();
    setInterval(refreshMonthlyList, 15000);
  });
</script>

  <script>
  // ---- Tab navigation ----
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.view).classList.add('active');
    });
  });
</script>
</body>
</html>
